name: Deploy to Hostinger VPS

# Auto-deploy pipeline.
#  - Fires on every push to main that touches a deployable file.
#  - Markdown-only commits (docs / playbook / README tweaks) are skipped
#    so editing CLIENT_DEPLOY.md doesn't spend CI minutes + rebuild.
#  - workflow_dispatch lets the operator force a redeploy from the
#    Actions tab without making a code change.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Serialise: if two pushes land back-to-back we don't want two SSH
# sessions tearing into Docker concurrently. The second push waits.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

# Shared SSH config — reused by each attempt below. Bumped timeout from
# the old 60s because Hostinger's SSH listener occasionally takes >60s
# to accept a connection from GitHub Actions runner IPs (we saw two
# identical 1m 7s i/o-timeout failures with the default).
# Backoffs between attempts widened (45s, 120s) so a fail2ban block
# triggered by burst pushes has time to expire before the next try.
env:
  SSH_TIMEOUT: 180s
  CMD_TIMEOUT: 12m

jobs:
  deploy:
    name: Pull + rebuild on Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      # ---------- Attempt 1 ---------------------------------------------
      - name: Deploy attempt 1 of 3
        id: try1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          timeout:         ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.CMD_TIMEOUT }}
          script: |
            set -euo pipefail
            echo "==> Step 1/4: Pulling latest code from origin/main"
            cd /opt/mastermind-automation
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline
            echo
            echo "==> Step 2/4: Rebuilding Docker images (using layer cache)"
            docker compose --env-file .env.production up -d --build
            echo
            echo "==> Step 3/4: Pruning unused images"
            docker image prune -f
            echo
            echo "==> Step 4/4: Container status"
            docker compose ps
            echo
            echo "==> Deploy complete (attempt 1)."

      # ---------- Attempt 2 (only if attempt 1 failed) ------------------
      - name: Wait 45s before retry
        if: steps.try1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed (likely Hostinger SSH transient timeout or fail2ban block). Backing off 45s before retry."
          sleep 45

      - name: Deploy attempt 2 of 3
        id: try2
        if: steps.try1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          timeout:         ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.CMD_TIMEOUT }}
          script: |
            set -euo pipefail
            cd /opt/mastermind-automation
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline
            docker compose --env-file .env.production up -d --build
            docker image prune -f
            docker compose ps
            echo "==> Deploy complete (attempt 2)."

      # ---------- Attempt 3 (final — failure here fails the workflow) ---
      - name: Wait 120s before final retry
        if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        run: |
          echo "Attempt 2 also failed. Final 120s backoff (covers most fail2ban windows) before last try."
          sleep 120

      - name: Deploy attempt 3 of 3
        if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          timeout:         ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.CMD_TIMEOUT }}
          script: |
            set -euo pipefail
            cd /opt/mastermind-automation
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline
            docker compose --env-file .env.production up -d --build
            docker image prune -f
            docker compose ps
            echo "==> Deploy complete (attempt 3)."
