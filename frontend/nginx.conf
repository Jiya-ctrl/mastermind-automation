# --------------------------------------------------------------------------
# Nginx site config — serves the built Vite SPA.
#
# Three things matter:
#   1. SPA fallback: any path that isn't a real file routes back to
#      index.html so React Router owns /login, /dashboard, /delivery etc.
#   2. Long-cache for /assets/* (Vite emits content-hashed filenames so
#      they're safe to cache forever).
#   3. No-cache for index.html so a fresh deploy is picked up immediately
#      without operators having to hard-refresh.
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text-y MIME types. nginx:alpine ships brotli-less so we
    # rely on gzip + Traefik's transport compression.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Vite-emitted, content-hashed assets: cache them aggressively.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static favicon/logo passthrough.
    location ~* \.(?:svg|jpg|jpeg|png|ico|webp|woff2?|ttf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA fallback: real files served directly; everything else gets
    # index.html so client-side routing handles it.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
